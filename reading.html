<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="logo.png">
    <title>Reading Challenge 📖</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="main-nav">
        <div class="nav-logo">Reading Lab ❤️</div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="lessons.html">Lessons</a>
            <a href="quiz.html">Quiz</a>
            <a href="reading.html">Reading</a>
        </div>
        <button id="theme-toggle">🌙</button>
    </nav>

    <main class="reading-container" style="max-width: 700px; margin: 40px auto; padding: 20px;">
        <div id="story-box" style="background: var(--card-bg); padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px;">
            <h2 id="story-title" style="color: var(--accent-color);"></h2>
            <p id="story-text" style="font-size: 1.1rem; line-height: 1.6;"></p>
        </div>

        <div id="questions-box" style="background: var(--card-bg); padding: 20px; border-radius: 15px;">
            <h3>Answer these:</h3>
            <div id="questions-list"></div>
            <button onclick="checkReadingAnswers()" style="margin-top: 20px; padding: 10px 20px; background: var(--accent-color); color: white; border: none; border-radius: 5px; cursor: pointer; width: 100%;">Check My Answers</button>
            <p id="reading-feedback" style="margin-top: 15px; font-weight: bold; text-align: center;"></p>
<button id="new-story-btn" onclick="nextStory()" style="display:none; margin-top: 10px; width: 100%; padding: 10px; background: var(--secondary-color); color: white; border: none; border-radius: 5px; cursor: pointer;">
    Next Story ➡️
</button>      
  </div>
        <div id="surprise-box"  style="display: none; margin-top: 30px; padding: 40px; background: linear-gradient(135deg, #ffeaa7, #fab1a0); border-radius: 20px; text-align: center; border: 3px solid #fdcb6e; box-shadow: 0 10px 20px rgba(0,0,0,0.1);">
    <h1 style="font-size: 3rem;">🎉 You Did It! 🎉</h1>
    <p style="font-size: 1.2rem; font-weight: bold;">I am so incredibly proud of how hard you are working on your English.</p>
    <p style="font-size: 1.1rem; margin-top: 10px;">Every lesson you finish is a step closer to our dreams. I'm always here to cheer you on! ❤️</p>
    <div style="font-size: 4rem; margin-top: 20px;">🏆🥇⭐</div>
</div>
    </main>

    <script src="script.js"></script>
</body>
</html>
