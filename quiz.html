<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="logo.png">
    <title>English Quiz ✍️</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="main-nav">
        <div class="nav-logo">English Quiz ❤️</div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="lessons.html">Lessons</a>
            <a href="quiz.html">Quiz</a>
            <a href="reading.html">Reading</a>
        </div>
        <button id="theme-toggle">🌙</button>
    </nav>

    <main class="quiz-container" style="max-width: 500px; margin: 50px auto; padding: 20px; background: var(--card-bg); border-radius: 15px; text-align: center;">
        <h2 id="quiz-question">Loading question...</h2>
        <div class="quiz-input-area" style="margin-top: 20px;">
            <input type="text" id="user-answer" placeholder="Type 'a' or 'an'..." style="padding: 10px; width: 60%; border-radius: 5px; border: 1px solid var(--accent-color);">
            <button onclick="checkAnswer()" style="padding: 10px 20px; background: var(--accent-color); color: white; border: none; border-radius: 5px; cursor: pointer;">Check</button>
        </div>
        <p id="feedback" style="margin-top: 20px; font-weight: bold;"></p>
        <button id="next-btn" onclick="nextQuestion()" style="display: none; margin-top: 10px; padding: 10px 20px; background: var(--secondary-color); color: white; border: none; border-radius: 5px; cursor: pointer;">Next Question ➡️</button>
    </main>

    <script src="script.js"></script>
</body>
</html>
